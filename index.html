<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Scheduler</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:sans-serif;font-size:14px;color:#111;background:#f0f0f0}
.app{display:flex;flex-direction:column;height:100vh;background:#fff}
.topbar{flex-shrink:0;display:flex;align-items:center;gap:4px;padding:10px 16px;border-bottom:1px solid #e0e0e0;background:#f7f7f5;position:sticky;top:0;z-index:50}
.logo{font-size:14px;font-weight:600;margin-right:12px;white-space:nowrap}
.nb{padding:6px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#666}
.nb:hover{background:#fff}
.nb.active{background:#fff;color:#111;font-weight:500}
.uinfo{margin-left:auto;font-size:11px;color:#aaa;display:flex;align-items:center;gap:8px}
.main{flex:1;overflow:auto;padding:20px;background:#fff}
.pg{display:none}.pg.active{display:block}
.ptitle{font-size:17px;font-weight:600;margin-bottom:14px}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:14px;margin-bottom:14px}
.row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
label{font-size:12px;color:#888;display:block;margin-bottom:3px}
input,select{font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#111;width:100%}
.btn{padding:6px 13px;border-radius:7px;border:1px solid #ddd;background:transparent;cursor:pointer;font-size:13px;color:#111;white-space:nowrap}
.btn:hover{background:#f5f5f5}
.btnp{background:#185FA5;color:#fff;border-color:#185FA5}
.btnp:hover{background:#0C447C}
.btnd{color:#a32d2d;border-color:#f7c1c1}
.btnd:hover{background:#fcebeb}
.btns{padding:3px 9px;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 9px;border-bottom:1px solid #e5e5e5;font-weight:500;font-size:12px;color:#888}
td{padding:7px 9px;border-bottom:1px solid #f0f0f0}
.ba{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;background:#B5D4F4;color:#0C447C}
.bc{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;background:#9FE1CB;color:#085041}
.pc{border:1px solid #e5e5e5;border-radius:8px;padding:11px;cursor:pointer;margin-bottom:8px}
.pc:hover{border-color:#bbb}
.pc.sel{border-color:#185FA5;background:#E6F1FB}
.empty{text-align:center;padding:36px;color:#bbb;font-size:13px}
.calt{border-collapse:collapse;font-size:11px}
.calt th,.calt td{border:1px solid #e5e5e5;padding:2px 4px;white-space:nowrap}
.calt th{background:#f7f7f5;font-weight:500;text-align:center}
.datecol{min-width:72px;width:72px;background:#f7f7f5;position:sticky;left:0;z-index:2}
.datecol.th-corner{z-index:5}
.chip{border-radius:3px;padding:1px 4px;font-size:10px;white-space:nowrap;display:inline-block;margin:1px 0}
.ca{background:#B5D4F4;color:#0C447C}
.cc{background:#9FE1CB;color:#085041}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:#f7f7f5;border-radius:8px;padding:9px 13px;min-width:110px}
.sv{font-size:19px;font-weight:600}.sl{font-size:11px;color:#888;margin-top:1px}
.tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid #e5e5e5;padding-bottom:6px}
.tab{padding:5px 13px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#888}
.tab.active{background:#f0f0f0;color:#111;font-weight:500}
.alrt{padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:12px;background:#E6F1FB;color:#0C447C}
.err{background:#FCEBEB;color:#a32d2d}
.fg{margin-bottom:11px}
.dc{display:flex;flex-wrap:wrap;gap:7px}
.dc label{display:flex;align-items:center;gap:4px;font-size:12px;color:#111;cursor:pointer;font-weight:normal}
.dc input[type=checkbox]{width:auto}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:480px;max-width:95vw;border:1px solid #e5e5e5;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:13px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.login-wrap{position:fixed;inset:0;background:#f0f0f0;display:flex;align-items:center;justify-content:center;z-index:300}
.login-box{width:340px;padding:32px;border:1px solid #e5e5e5;border-radius:12px;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.login-box h2{font-size:20px;font-weight:600;margin-bottom:4px}
.login-box p{font-size:12px;color:#888;margin-bottom:20px}
.login-err{color:#a32d2d;font-size:12px;margin-top:8px;min-height:16px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#185FA5;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.cal-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #e5e5e5}
.person-table th{background:#f7f7f5}
.person-table tr:hover td{background:#fafafa}
.imp-zone{border:2px dashed #ddd;border-radius:8px;padding:24px;text-align:center;cursor:pointer;color:#888;font-size:13px;margin-bottom:12px}
.imp-zone:hover{border-color:#185FA5;color:#185FA5}
.imp-preview{max-height:200px;overflow-y:auto;margin-bottom:12px}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <h2>Team Scheduler</h2>
    <p>Sign in to continue</p>
    <div class="fg"><label>Username</label><input id="li-user" placeholder="Enter username" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="fg"><label>Password</label><input type="password" id="li-pass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btnp" style="width:100%;margin-top:4px" onclick="doLogin()" id="li-btn">Sign in</button>
    <div class="login-err" id="li-err"></div>
  </div>
</div>

<!-- App -->
<div class="app" id="app" style="display:none">
  <div class="topbar">
    <div class="logo">Team Scheduler</div>
    <span id="nav-admin" style="display:none;gap:4px">
      <button class="nb active" onclick="nav('periods')">Periods</button>
      <button class="nb" onclick="nav('employees')">Employees</button>
      <button class="nb" onclick="nav('calendar')">Calendar</button>
      <button class="nb" onclick="nav('settings')">Settings</button>
    </span>
    <span id="nav-viewer" style="display:none">
      <button class="nb active">Calendar</button>
    </span>
    <div class="uinfo">
      <span id="uname-label"></span>
      <button class="btn btns" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <!-- PERIODS -->
    <div class="pg active" id="pg-periods">
      <div class="ptitle">Schedule Periods</div>
      <div class="card">
        <div style="font-size:13px;font-weight:500;margin-bottom:9px;color:#888">Create new period</div>
        <div class="row">
          <div style="flex:2"><label>Period name</label><input id="p-name" placeholder="e.g. H1 2025"></div>
          <div style="flex:1"><label>Start date</label><input type="date" id="p-start"></div>
          <div style="flex:1"><label>End date</label><input type="date" id="p-end"></div>
          <button class="btn btnp" onclick="addPeriod()">Add period</button>
        </div>
      </div>
      <div id="periods-list"></div>
    </div>

    <!-- EMPLOYEES -->
    <div class="pg" id="pg-employees">
      <div class="ptitle">Employees</div>
      <div id="emp-alert" style="display:none" class="alrt"></div>
      <div id="emp-content"></div>
    </div>

    <!-- CALENDAR — same for admin & viewer -->
    <div class="pg" id="pg-calendar">
      <div class="ptitle">Schedule Calendar</div>
      <div id="cal-alert" style="display:none" class="alrt"></div>
      <div class="cal-toolbar" id="cal-toolbar" style="display:none">
        <div style="display:flex;align-items:center;gap:8px">
          <label style="font-size:12px;color:#888;margin:0;white-space:nowrap">Period:</label>
          <select id="cal-period-picker" onchange="calPickPeriod(this.value)" style="max-width:240px"></select>
        </div>
        <div style="display:flex;gap:4px">
          <button class="tab active" id="cal-tab-grid" onclick="calSetTab('grid')">Full calendar</button>
          <button class="tab" id="cal-tab-person" onclick="calSetTab('person')">By employee</button>
        </div>
        <div id="cal-person-picker-wrap" style="display:none;align-items:center;gap:8px">
          <label style="font-size:12px;color:#888;margin:0;white-space:nowrap">Employee:</label>
          <select id="cal-person-picker" onchange="calSetPerson(this.value)" style="max-width:200px"></select>
        </div>
        <button class="btn btns btnp" onclick="downloadCSV()" style="margin-left:auto">&#11015; Download CSV</button>
      </div>
      <div id="cal-content"></div>
    </div>

    <!-- USERS -->
    <div class="pg" id="pg-settings">
      <div class="ptitle">Settings</div>
      <div class="tabs">
        <button class="tab active" id="stab-access" onclick="renderSettings('access')">Access</button>
        <button class="tab" id="stab-vacations" onclick="renderSettings('vacations')">Holidays</button>
      </div>
      <div id="settings-content"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeMod()">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://cqmvotqsptqrzogvrulk.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxbXZvdHFzcHRxcnpvZ3ZydWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjgwODksImV4cCI6MjA5MjEwNDA4OX0.Yyxalgqg5BHsULgPDPXewJaQ23L7muldKVlSGxmMaTs';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);

const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAYF=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
function pad(n){return n<10?'0'+n:''+n}
function uid(){return 'x'+Math.random().toString(36).slice(2,10)}
function fmtD(d){if(!d)return'';const p=d.split('-');return p[1]+'/'+p[2]+'/'+p[0];}
function fmtDs(d){const dt=new Date(d+'T00:00:00');return(dt.getMonth()+1)+'/'+(dt.getDate());}
function fmtFull(d){const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'});}
// Net hours after break
function netHrs(s){
  const a=s.shift_start.split(':'),b=s.shift_end.split(':');
  const gross=(+b[0]*60+ +b[1]- +a[0]*60- +a[1])/60;
  const brk=(s.break_minutes!=null?s.break_minutes:30)/60;
  return Math.max(0,gross-brk);
}
function toast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=err?'#a32d2d':'#1a1a1a';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}
function showMod(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('overlay').classList.add('open');}
function closeMod(){document.getElementById('overlay').classList.remove('open');document.getElementById('modal-box').innerHTML='';}

let currentUser=null,currentPeriod=null,empTab='list',calTab='grid',calPersonId=null;
let globalVacSet=new Set(); // loaded at login, used everywhere
let calCache={period:null,emps:null};

// ── AUTH ──────────────────────────────────────────────────
async function doLogin(){
  const u=document.getElementById('li-user').value.trim();
  const p=document.getElementById('li-pass').value;
  document.getElementById('li-err').textContent='';
  document.getElementById('li-btn').innerHTML='<span class="spinner"></span>Signing in...';
  document.getElementById('li-btn').disabled=true;
  const {data,error}=await db.from('users').select('*').eq('username',u).eq('password',p).single();
  document.getElementById('li-btn').innerHTML='Sign in';
  document.getElementById('li-btn').disabled=false;
  if(error||!data){document.getElementById('li-err').textContent='Invalid username or password.';return;}
  currentUser=data;
  // Load vacations globally so all pages use them
  await loadGlobalVacations();
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('uname-label').textContent=data.name+' ('+data.role+')';
  if(data.role==='admin'){document.getElementById('nav-admin').style.display='flex';nav('periods');}
  else{document.getElementById('nav-viewer').style.display='flex';showCal();}
}
async function loadGlobalVacations(){
  try{
    const {data:vacs,error}=await db.from('vacations').select('date');
    globalVacSet=new Set((vacs||[]).map(v=>v.date));
  }catch(e){globalVacSet=new Set();}
}
function doLogout(){
  currentUser=null;currentPeriod=null;calCache={period:null,emps:null};globalVacSet=new Set();
  document.getElementById('app').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('li-user').value='';document.getElementById('li-pass').value='';
  document.getElementById('nav-admin').style.display='none';
  document.getElementById('nav-viewer').style.display='none';
}

// ── NAV ───────────────────────────────────────────────────
function nav(p){
  document.querySelectorAll('#nav-admin .nb').forEach((b,i)=>{
    b.classList.toggle('active',['periods','employees','calendar','settings'][i]===p);
  });
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('active'));
  document.getElementById('pg-'+p).classList.add('active');
  if(p==='periods')renderPeriods();
  if(p==='employees')renderEmp();
  if(p==='calendar')renderCal();
  if(p==='settings'){renderSettings('access');}
}
function showCal(){
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('active'));
  document.getElementById('pg-calendar').classList.add('active');
  renderCal();
}

// ── PERIODS ───────────────────────────────────────────────
async function renderPeriods(){
  const c=document.getElementById('periods-list');
  c.innerHTML='<div class="empty"><span class="spinner"></span> Loading...</div>';
  const {data,error}=await db.from('periods').select('*').order('start_date');
  if(error){c.innerHTML='<div class="alrt err">Error loading periods.</div>';return;}
  if(!data.length){c.innerHTML='<div class="empty">No periods yet. Create one above.</div>';return;}
  c.innerHTML=data.map(p=>`
    <div class="pc ${currentPeriod===p.id?'sel':''}" onclick="selectPeriod('${p.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div><div style="font-weight:500">${p.name}</div>
        <div style="font-size:12px;color:#888;margin-top:2px">${fmtD(p.start_date)} &rarr; ${fmtD(p.end_date)}</div></div>
        <div style="display:flex;gap:6px;align-items:center">
          ${currentPeriod===p.id?'<span style="font-size:11px;color:#185FA5;font-weight:500">Selected</span>':''}
          <button class="btn btns" onclick="event.stopPropagation();copyScheduleMod('${p.id}','${p.name}','${p.start_date}','${p.end_date}')">Copy from&hellip;</button>
          <button class="btn btns" onclick="event.stopPropagation();editPeriodMod('${p.id}','${p.name}','${p.start_date}','${p.end_date}')">Edit</button>
          <button class="btn btns" style="color:#92540a;border-color:#f5cfa0" onclick="event.stopPropagation();resetPeriod('${p.id}','${p.name}')">Reset</button>
          <button class="btn btns btnd" onclick="event.stopPropagation();deletePeriod('${p.id}')">Delete</button>
        </div>
      </div>
    </div>`).join('');
}
function selectPeriod(id){currentPeriod=id;renderPeriods();}
async function addPeriod(){
  const name=document.getElementById('p-name').value.trim();
  const start=document.getElementById('p-start').value;
  const end=document.getElementById('p-end').value;
  if(!name||!start||!end){alert('Fill all fields');return;}
  const {error}=await db.from('periods').insert({id:uid(),name,start_date:start,end_date:end});
  if(error){toast('Error adding period',true);return;}
  document.getElementById('p-name').value='';
  document.getElementById('p-start').value='';
  document.getElementById('p-end').value='';
  toast('Period added');renderPeriods();
}
async function deletePeriod(id){
  if(!confirm('Delete this period and all its employees?'))return;
  await db.from('periods').delete().eq('id',id);
  if(currentPeriod===id)currentPeriod=null;
  toast('Period deleted');renderPeriods();
}
async function resetPeriod(id,name){
  // Two-step confirmation for destructive action
  showMod(`<h3>Reset period</h3>
    <div style="background:#fff8f0;border:1px solid #f5cfa0;border-radius:8px;padding:12px 14px;margin-bottom:14px">
      <div style="font-weight:600;color:#92540a;margin-bottom:6px">&#9888; This will permanently delete:</div>
      <ul style="font-size:13px;color:#92540a;padding-left:18px;line-height:1.8">
        <li>All employees in <strong>${name}</strong></li>
        <li>All their shift schedules</li>
      </ul>
      <div style="font-size:12px;color:#92540a;margin-top:8px">The period itself (name and dates) will be kept.</div>
    </div>
    <div class="fg"><label style="font-size:12px;color:#666">Type the period name to confirm:</label>
      <input id="m-reset-confirm" placeholder="${name}" oninput="document.getElementById('m-reset-btn').disabled=this.value!=='${name}'">
    </div>
    <div class="ma">
      <button class="btn" onclick="closeMod()">Cancel</button>
      <button class="btn" id="m-reset-btn" disabled
        style="background:#c05e0a;color:#fff;border-color:#c05e0a"
        onclick="confirmResetPeriod('${id}','${name}')">Reset period</button>
    </div>`);
}
async function confirmResetPeriod(id,name){
  document.getElementById('m-reset-btn').disabled=true;
  document.getElementById('m-reset-btn').textContent='Resetting...';
  // Delete all employees in this period (cascades to schedules via FK)
  const {error}=await db.from('employees').delete().eq('period_id',id);
  if(error){toast('Error resetting period',true);closeMod();return;}
  closeMod();
  toast('Period "'+name+'" has been reset — all employees and schedules removed');
  if(currentPeriod===id)renderEmp();
  renderPeriods();
}
function editPeriodMod(id,name,start,end){
  showMod(`<h3>Edit period</h3>
    <div class="fg"><label>Name</label><input id="m-n" value="${name}"></div>
    <div class="row">
      <div style="flex:1"><label>Start</label><input type="date" id="m-s" value="${start}"></div>
      <div style="flex:1"><label>End</label><input type="date" id="m-e" value="${end}"></div>
    </div>
    <div class="ma"><button class="btn" onclick="closeMod()">Cancel</button>
    <button class="btn btnp" onclick="savePeriod('${id}')">Save</button></div>`);
}
async function savePeriod(id){
  const name=document.getElementById('m-n').value.trim();
  const start=document.getElementById('m-s').value;
  const end=document.getElementById('m-e').value;
  await db.from('periods').update({name,start_date:start,end_date:end}).eq('id',id);
  closeMod();toast('Period updated');renderPeriods();
}

// ── COPY SCHEDULE ─────────────────────────────────────────
async function copyScheduleMod(toPeriodId,toPeriodName,toPeriodStart,toPeriodEnd){
  // Load all other periods to pick source from
  const {data:allPeriods}=await db.from('periods').select('*').order('start_date');
  const others=allPeriods.filter(p=>p.id!==toPeriodId);
  if(!others.length){
    showMod(`<h3>Copy schedule</h3>
      <p style="font-size:13px;color:#888;margin-bottom:16px">No other periods available to copy from.</p>
      <div class="ma"><button class="btn" onclick="closeMod()">Close</button></div>`);
    return;
  }
  const opts=others.map(p=>`<option value="${p.id}">${p.name} (${fmtD(p.start_date)} &ndash; ${fmtD(p.end_date)})</option>`).join('');
  showMod(`<h3>Copy schedule into <em>${toPeriodName}</em></h3>
    <p style="font-size:13px;color:#888;margin-bottom:14px">
      Select a source period. Employees whose schedules overlap with
      <strong>${fmtD(toPeriodStart)} &ndash; ${fmtD(toPeriodEnd)}</strong>
      will be copied into this period.
    </p>
    <div class="fg"><label>Copy from period</label>
      <select id="m-copy-src">${opts}</select>
    </div>
    <div style="font-size:12px;color:#888;margin-bottom:4px">
      &#9432; If an employee already exists in <em>${toPeriodName}</em>, their existing schedules
      will be <strong>replaced</strong> with the copied ones. You will be warned before this happens.
    </div>
    <div class="ma">
      <button class="btn" onclick="closeMod()">Cancel</button>
      <button class="btn btnp" onclick="doCopySchedule('${toPeriodId}','${toPeriodStart}','${toPeriodEnd}')">Preview &amp; copy &rarr;</button>
    </div>`);
}

async function doCopySchedule(toPeriodId,toPeriodStart,toPeriodEnd){
  const srcId=document.getElementById('m-copy-src').value;
  if(!srcId)return;

  // Load source employees + schedules
  const {data:srcEmps}=await db.from('employees').select('*, schedules(*)').eq('period_id',srcId).order('name');
  if(!srcEmps||!srcEmps.length){
    toast('Source period has no employees',true);return;
  }

  // Find employees whose schedules overlap with target period date range
  const toStart=toPeriodStart,toEnd=toPeriodEnd;
  const overlapping=srcEmps.filter(e=>{
    return (e.schedules||[]).some(s=>s.from_date<=toEnd&&s.to_date>=toStart);
  });

  if(!overlapping.length){
    toast('No schedules overlap with the target period dates',true);return;
  }

  // Load existing employees in target period to detect conflicts
  const {data:existingEmps}=await db.from('employees').select('id,name').eq('period_id',toPeriodId);
  const existingNames=(existingEmps||[]).map(e=>e.name.toLowerCase());
  const conflicts=overlapping.filter(e=>existingNames.includes(e.name.toLowerCase()));

  // Build preview HTML
  const empList=overlapping.map(e=>{
    const hasConflict=existingNames.includes(e.name.toLowerCase());
    const overlappingSchs=(e.schedules||[]).filter(s=>s.from_date<=toEnd&&s.to_date>=toStart);
    return `<tr>
      <td style="font-weight:500">${e.name}</td>
      <td><span class="${e.type==='A'?'ba':'bc'}">${e.type==='A'?'APN':'Counseling'}</span></td>
      <td>${overlappingSchs.length} schedule${overlappingSchs.length!==1?'s':''}</td>
      <td>${hasConflict
        ?'<span style="color:#a32d2d;font-weight:500">&#9888; Will replace existing</span>'
        :'<span style="color:#0f6e56">&#10003; New</span>'}</td>
    </tr>`;
  }).join('');

  const warnHtml=conflicts.length
    ?`<div style="background:#FCEBEB;color:#a32d2d;border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:12px">
        <strong>&#9888; Warning:</strong> ${conflicts.length} employee${conflicts.length!==1?'s':''} already exist${conflicts.length===1?'s':''} in <em>${toPeriodStart} &ndash; ${toPeriodEnd}</em>.
        Their current schedules in that period will be <strong>deleted and replaced</strong> with the copied ones.
      </div>`
    :'';

  showMod(`<h3>Preview: ${overlapping.length} employee${overlapping.length!==1?'s':''} to copy</h3>
    ${warnHtml}
    <div style="max-height:260px;overflow-y:auto;margin-bottom:12px">
      <table>
        <thead><tr><th>Employee</th><th>Type</th><th>Schedules</th><th>Status</th></tr></thead>
        <tbody>${empList}</tbody>
      </table>
    </div>
    <div class="ma">
      <button class="btn" onclick="closeMod()">Cancel</button>
      <button class="btn btnp" onclick="confirmCopySchedule('${srcId}','${toPeriodId}','${toPeriodStart}','${toPeriodEnd}')">${conflicts.length?'&#9888; Replace &amp; copy':'Copy schedules'}</button>
    </div>`);
}

async function confirmCopySchedule(srcId,toPeriodId,toStart,toEnd){
  document.querySelector('#modal-box .btnp').disabled=true;
  document.querySelector('#modal-box .btnp').textContent='Copying...';

  const {data:srcEmps}=await db.from('employees').select('*, schedules(*)').eq('period_id',srcId).order('name');
  const {data:existingEmps}=await db.from('employees').select('id,name').eq('period_id',toPeriodId);
  const existingMap={};
  (existingEmps||[]).forEach(e=>existingMap[e.name.toLowerCase()]=e.id);

  let created=0,updated=0,scheds=0,errors=0;

  for(const srcEmp of srcEmps){
    // Only copy schedules overlapping with target period
    const overlappingSchs=(srcEmp.schedules||[]).filter(s=>s.from_date<=toEnd&&s.to_date>=toStart);
    if(!overlappingSchs.length)continue;

    const nameKey=srcEmp.name.toLowerCase();
    let empId=existingMap[nameKey];

    if(empId){
      // Employee exists — delete their existing schedules in the target period date range
      const {data:oldSchs}=await db.from('schedules')
        .select('id').eq('employee_id',empId);
      // Delete schedules that overlap with the target period
      const toDelete=(oldSchs||[]).filter(s=>true); // delete all for this employee in this period
      if(toDelete.length){
        await db.from('schedules').delete().eq('employee_id',empId);
      }
      updated++;
    } else {
      // Create new employee in target period
      empId=uid();
      const {error}=await db.from('employees').insert({
        id:empId,period_id:toPeriodId,name:srcEmp.name,type:srcEmp.type
      });
      if(error){errors++;continue;}
      existingMap[nameKey]=empId;
      created++;
    }

    // Clip schedule dates to the target period bounds and copy
    for(const s of overlappingSchs){
      const fromDate=s.from_date<toStart?toStart:s.from_date;
      const toDate=s.to_date>toEnd?toEnd:s.to_date;
      const {error}=await db.from('schedules').insert({
        id:uid(),
        employee_id:empId,
        days:s.days,
        shift_start:s.shift_start,
        shift_end:s.shift_end,
        break_minutes:s.break_minutes!=null?s.break_minutes:30,
        from_date:fromDate,
        to_date:toDate
      });
      if(error)errors++;
      else scheds++;
    }
  }

  closeMod();
  toast(`Done: ${created} new, ${updated} updated, ${scheds} schedules copied${errors?' ('+errors+' errors)':''}`);
  renderPeriods();
}

// Count how many times a schedule fires within the period date range
function parseLocalDate(d){return new Date(d+'T00:00:00');}
function countShifts(s,period){
  const f=new Date(Math.max(+parseLocalDate(s.from_date),+parseLocalDate(period.start_date)));
  const t=new Date(Math.min(+parseLocalDate(s.to_date),+parseLocalDate(period.end_date)));
  if(f>t)return 0;
  let count=0;
  const x=new Date(f);
  while(x<=t){
    const ds=x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
    const dn=DAYS[x.getDay()===0?6:x.getDay()-1];
    if((s.days||[]).includes(dn)&&!globalVacSet.has(ds))count++;
    x.setDate(x.getDate()+1);
  }
  return count;
}
function calcTotalHours(emp,period){
  let tot=0;
  (emp.schedules||[]).forEach(s=>{
    const f=new Date(Math.max(+parseLocalDate(s.from_date),+parseLocalDate(period.start_date)));
    const t=new Date(Math.min(+parseLocalDate(s.to_date),+parseLocalDate(period.end_date)));
    if(f>t)return;
    const nh=netHrs(s);
    const x=new Date(f);
    while(x<=t){
      const ds=x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
      const dn=DAYS[x.getDay()===0?6:x.getDay()-1];
      if((s.days||[]).includes(dn)&&!globalVacSet.has(ds))tot+=nh;
      x.setDate(x.getDate()+1);
    }
  });
  return tot;
}

let importRows=[];
function handleImportFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{defval:''});
    importRows=raw.filter(r=>r.name&&r.type&&r.days);
    if(!importRows.length){
      document.getElementById('imp-status').textContent='No valid rows found. Check the template format.';
      document.getElementById('imp-btn').disabled=true;return;
    }
    // Preview
    const prev=document.getElementById('imp-preview');
    prev.innerHTML=`<div class="imp-preview"><table>
      <thead><tr><th>Name</th><th>Type</th><th>Days</th><th>Shift</th><th>Break</th><th>From</th><th>To</th></tr></thead>
      <tbody>${importRows.map(r=>`<tr>
        <td>${r.name}</td><td>${r.type}</td><td>${r.days}</td>
        <td>${r.shift_start} &ndash; ${r.shift_end}</td>
        <td>${r.break_minutes!=null?r.break_minutes:30} min</td>
        <td>${r.from_date}</td><td>${r.to_date}</td>
      </tr>`).join('')}</tbody></table></div>`;
    document.getElementById('imp-status').textContent=`${importRows.length} schedule row(s) ready to import.`;
    document.getElementById('imp-btn').disabled=false;
  };
  reader.readAsArrayBuffer(file);
}

// Convert any date value from Excel -> YYYY-MM-DD
// Handles: Excel serial number, JS Date object, MM/DD/YYYY string, YYYY-MM-DD string
function parseImportDate(val){
  if(val==null||val==='')return '';
  // JS Date (SheetJS with cellDates:true)
  if(val instanceof Date){
    const y=val.getFullYear(),mo=String(val.getMonth()+1).padStart(2,'0'),d=String(val.getDate()).padStart(2,'0');
    return y+'-'+mo+'-'+d;
  }
  const s=String(val).trim();
  // Already ISO YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  // MM/DD/YYYY
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  // Excel numeric serial (days since 1899-12-30)
  if(/^\d+(\.\d+)?$/.test(s)){
    const d=new Date(Math.round((parseFloat(s)-25569)*86400*1000));
    const y=d.getUTCFullYear(),mo=String(d.getUTCMonth()+1).padStart(2,'0'),dd=String(d.getUTCDate()).padStart(2,'0');
    return y+'-'+mo+'-'+dd;
  }
  return s;
}
// Convert any time value from Excel -> HH:MM (24h)
// Handles: Excel fractional day (0.375 = 9:00), H:MM AM/PM string, HH:MM string
function parseImportTime(val){
  if(val==null||val==='')return '';
  // JS Date object (SheetJS with cellDates:true passes time as a date)
  if(val instanceof Date){
    return String(val.getHours()).padStart(2,'0')+':'+String(val.getMinutes()).padStart(2,'0');
  }
  const s=String(val).trim();
  // Already HH:MM 24h
  if(/^\d{2}:\d{2}$/.test(s))return s;
  // H:MM AM/PM
  const ampm=s.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if(ampm){
    let h=parseInt(ampm[1]);const min=ampm[2];const period=ampm[3].toUpperCase();
    if(period==='AM'&&h===12)h=0;
    if(period==='PM'&&h!==12)h+=12;
    return String(h).padStart(2,'0')+':'+min;
  }
  // Excel fractional day  e.g. 0.375 = 9:00 AM
  if(/^0?\.\d+$/.test(s)){
    const totalMin=Math.round(parseFloat(s)*24*60);
    const h=Math.floor(totalMin/60),m=totalMin%60;
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  }
  return s;
}
async function doImport(){
  if(!importRows.length)return;
  document.getElementById('imp-btn').disabled=true;
  document.getElementById('imp-status').textContent='Importing...';

  // Get existing employees for this period
  const {data:existing}=await db.from('employees').select('id,name').eq('period_id',currentPeriod);
  const empMap={};
  (existing||[]).forEach(e=>empMap[e.name.toLowerCase()]=e.id);

  let created=0,scheds=0,errors=0;
  for(const r of importRows){
    const nameKey=r.name.trim().toLowerCase();
    let empId=empMap[nameKey];
    if(!empId){
      // Create employee
      empId=uid();
      const {error}=await db.from('employees').insert({id:empId,period_id:currentPeriod,name:r.name.trim(),type:r.type.trim().toUpperCase()});
      if(error){errors++;continue;}
      empMap[nameKey]=empId;
      created++;
    }
    // Parse days
    const days=String(r.days).split(',').map(d=>d.trim()).filter(d=>DAYS.includes(d));
    if(!days.length){errors++;continue;}
    const brk=r.break_minutes!==''&&r.break_minutes!=null?parseInt(r.break_minutes):30;
    const {error:se}=await db.from('schedules').insert({
      id:uid(),employee_id:empId,days,
      shift_start:parseImportTime(r.shift_start),
      shift_end:parseImportTime(r.shift_end),
      break_minutes:brk,
      from_date:parseImportDate(r.from_date),
      to_date:parseImportDate(r.to_date)
    });
    if(se)errors++;
    else scheds++;
  }
  document.getElementById('imp-status').textContent=
    `Done: ${created} employee(s) created, ${scheds} schedule(s) added${errors?', '+errors+' error(s)':''}.`;
  document.getElementById('imp-btn').disabled=false;
  toast(`Import complete: ${created} employees, ${scheds} schedules`);
  renderEmp();
}

// ── CALENDAR ──────────────────────────────────────────────
async function renderCal(){
  const ct=document.getElementById('cal-content');
  const toolbar=document.getElementById('cal-toolbar');
  ct.innerHTML='<div class="empty"><span class="spinner"></span> Loading...</div>';
  try{
    const {data:allPeriods,error:e1}=await db.from('periods').select('*').order('start_date');
    if(e1)throw new Error('Periods: '+e1.message);
    if(!allPeriods||!allPeriods.length){toolbar.style.display='none';ct.innerHTML='<div class="empty">No periods available yet.</div>';return;}
    if(!currentPeriod)currentPeriod=allPeriods[0].id;
    document.getElementById('cal-period-picker').innerHTML=
      allPeriods.map(p=>`<option value="${p.id}" ${currentPeriod===p.id?'selected':''}>${p.name} (${fmtD(p.start_date)} &ndash; ${fmtD(p.end_date)})</option>`).join('');
    toolbar.style.display='flex';
    const {data:period,error:e2}=await db.from('periods').select('*').eq('id',currentPeriod).single();
    if(e2)throw new Error('Period: '+e2.message);
    const {data:emps,error:e3}=await db.from('employees').select('*, schedules(*)').eq('period_id',currentPeriod).order('name');
    if(e3)throw new Error('Employees: '+e3.message);
    let vacSet=new Set(),vacMap={};
    const {data:vacs,error:e4}=await db.from('vacations').select('*');
    if(!e4&&vacs){vacs.forEach(v=>{vacSet.add(v.date);vacMap[v.date]=v.label||'Holiday';});}
    // Keep globalVacSet in sync
    globalVacSet=vacSet;
    calCache={period,emps,vacSet,vacMap};
    const pp=document.getElementById('cal-person-picker');
    if(emps&&emps.length){
      pp.innerHTML=emps.map(e=>`<option value="${e.id}" ${calPersonId===e.id?'selected':''}>${e.name}</option>`).join('');
      if(!calPersonId||!emps.find(e=>e.id===calPersonId))calPersonId=emps[0].id;
      pp.value=calPersonId;
    }
    if(!emps||!emps.length){ct.innerHTML='<div class="empty">No employees in this period.</div>';return;}
    if(calTab==='grid')renderCalGrid(period,emps,ct,vacSet,vacMap);
    else renderCalPerson(period,emps,ct,vacSet,vacMap);
  }catch(err){
    ct.innerHTML='<div class="alrt err" style="margin:16px">&#9888; Calendar error: '+err.message+'</div>';
    console.error('renderCal error:',err);
  }
}
function calPickPeriod(id){currentPeriod=id;calPersonId=null;renderCal();}
function calSetPerson(id){calPersonId=id;renderCalPerson(calCache.period,calCache.emps,document.getElementById('cal-content'));}
function calSetTab(t){
  calTab=t;
  document.getElementById('cal-tab-grid').classList.toggle('active',t==='grid');
  document.getElementById('cal-tab-person').classList.toggle('active',t==='person');
  document.getElementById('cal-person-picker-wrap').style.display=t==='person'?'flex':'none';
  if(!calCache.period||!calCache.emps)return;
  const ct=document.getElementById('cal-content');
  if(t==='grid')renderCalGrid(calCache.period,calCache.emps,ct,calCache.vacSet,calCache.vacMap);
  else renderCalPerson(calCache.period,calCache.emps,ct,calCache.vacSet,calCache.vacMap);
}

function renderCalGrid(period,emps,ct,vacSet,vacMap){
  // Timeline bounds: 8:00 to 19:30
  const T_START=8*60;   // 480 min
  const T_END=19*60+30; // 1170 min
  const T_SPAN=T_END-T_START; // 690 min

  // Build day rows
  const dayRows=[];
  const cur=new Date(period.start_date+'T00:00:00');
  const end=new Date(period.end_date+'T00:00:00');
  while(cur<=end){
    const ds=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
    const dow=cur.getDay(),dn=DAYS[dow===0?6:dow-1],wk=dow===0||dow===6;
    const isVac=vacSet&&vacSet.has(ds);
    const vacLabel=vacMap&&vacMap[ds]||'';
    const eds=isVac?emps.map(e=>({emp:e,sched:null})):emps.map(e=>{
      let act=null;
      (e.schedules||[]).forEach(s=>{if((s.days||[]).includes(dn)&&ds>=s.from_date&&ds<=s.to_date)act=s;});
      return{emp:e,sched:act};
    });
    dayRows.push({ds,dow,dn,wk,isVac,vacLabel,eds});
    cur.setDate(cur.getDate()+1);
  }

  // Hour tick marks for the header
  const ticks=[];
  for(let h=8;h<=19;h++) ticks.push(h);

  // Bar height and row height
  const BAR_H=18;   // px per employee bar
  const BAR_GAP=4;  // gap between bars
  const ROW_PAD=5;  // top+bottom padding
  const DATE_W=76;  // px for the date column

  // Color by type: APN = blue, Counseling = green
  const empColors=emps.map(e=>e.type==='A'?'#7aafd4':'#6dbfa0');

  // Build HTML
  let html=`<div style="font-size:13px;margin-bottom:6px;color:#888">Period: <strong>${period.name}</strong> | ${fmtD(period.start_date)} &ndash; ${fmtD(period.end_date)}</div>`;

  // Legend
  html+=`<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;align-items:center">`;
  html+=`<span style="display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:18px;height:12px;border-radius:3px;background:#7aafd4"></span>APN</span>`;
  html+=`<span style="display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:18px;height:12px;border-radius:3px;background:#6dbfa0"></span>Counseling</span>`;
  html+=`<span style="color:#bbb">|</span>`;
  html+=`<span style="display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:18px;height:12px;border-radius:3px;background:#e8e0d8;border:1px solid #c8b8a0"></span><span style="color:#7a5c3a">Holiday / Closed</span></span>`;
  emps.forEach((e,i)=>{
    html+=`<span style="font-size:11px;color:#555">${e.name} <span style="padding:1px 5px;border-radius:10px;font-size:10px;background:${e.type==='A'?'#daeaf7':'#c8f0e2'};color:${e.type==='A'?'#0C447C':'#085041'}">${e.type}</span></span>`;
  });
  html+=`</div>`;

  // Outer scroll container
  html+=`<div style="overflow-x:auto;overflow-y:auto;max-height:65vh;border:1px solid #e0e0e0;border-radius:8px;background:#fff">`;
  html+=`<div style="min-width:700px">`;

  // ── STICKY HEADER: date col + timeline ──────────────
  html+=`<div style="display:flex;position:sticky;top:0;z-index:20;background:#f7f7f5;border-bottom:2px solid #d0d0d0">`;
  // Date label
  html+=`<div style="flex-shrink:0;width:${DATE_W}px;font-size:11px;font-weight:600;color:#555;padding:6px 8px;border-right:2px solid #d0d0d0;position:sticky;left:0;z-index:21;background:#f7f7f5">Date</div>`;
  // Timeline ticks
  html+=`<div style="flex:1;position:relative;height:28px">`;
  ticks.forEach(h=>{
    const pct=((h*60-T_START)/T_SPAN*100).toFixed(3);
    const label=h<=12?h+':00 AM':h===12?'12:00 PM':(h-12)+':00 PM';
    html+=`<div style="position:absolute;left:${pct}%;top:0;height:100%;border-left:1px solid #d0d0d0;display:flex;align-items:center;padding-left:3px">
      <span style="font-size:10px;color:#888;white-space:nowrap">${label}</span>
    </div>`;
  });
  html+=`</div></div>`;

  // ── DAY ROWS ─────────────────────────────────────────
  dayRows.forEach(({ds,dow,dn,wk,isVac,vacLabel,eds})=>{
    // Week separator on Monday
    if(dow===1){
      const wdt=new Date(ds+'T00:00:00');
      const wend=new Date(wdt);wend.setDate(wend.getDate()+6);
      const mo=new Intl.DateTimeFormat('en-US',{month:'short'}).format(wdt);
      const moE=new Intl.DateTimeFormat('en-US',{month:'short'}).format(wend);
      const lbl=`Week of ${mo} ${wdt.getDate()}${mo!==moE?' – '+moE+' '+wend.getDate():''}`;
      html+=`<div style="background:#e8edf2;color:#3a4a5c;font-size:11px;font-weight:600;padding:4px 10px;border-top:2px solid #c5cdd8;position:sticky;left:0">${lbl}</div>`;
    }

    // Vacation day — render like a weekend but with label
    if(isVac){
      const rowBg='#f0ece8';
      html+=`<div style="display:flex;border-bottom:1px solid #b8a898;background:${rowBg};min-height:28px">`;
      html+=`<div style="flex-shrink:0;width:${DATE_W}px;padding:5px 8px;border-right:2px solid #d0c8c0;position:sticky;left:0;z-index:5;background:#e8e0d8">`;
      html+=`<div style="font-size:12px;font-weight:600;color:#7a5c3a">${fmtDs(ds)}</div>`;
      html+=`<div style="font-size:10px;color:#a07850">${dn}</div>`;
      html+=`</div>`;
      html+=`<div style="flex:1;display:flex;align-items:center;padding:0 12px;gap:8px">`;
      html+=`<span style="font-size:11px;color:#9b6b3a;font-weight:600">&#128718; ${vacLabel}</span>`;
      html+=`<span style="font-size:10px;color:#b89070;font-style:italic">Closed</span>`;
      html+=`</div></div>`;
      return;
    }

    // Normal day
    const workingEds=eds.filter(ed=>ed.sched);
    const rowH=workingEds.length>0
      ? ROW_PAD*2 + workingEds.length*(BAR_H+BAR_GAP) - BAR_GAP
      : 28;
    // Color palette by day-of-week index (Mon=0..Sun=6)
    // Mon/Wed/Fri = green family (alternating light/lighter)
    // Tue/Thu     = blue family (alternating light/lighter)
    // Sat/Sun     = warm gray (weekend)
    const DAY_ROW_BG   =['#e8f4ee','#e8eef8','#eef7f2','#edf3fb','#e8f4ee','#edebe8','#edebe8'];
    const DAY_CELL_BG  =['#d4ecde','#d4e4f4','#dceee5','#dce8f2','#d4ecde','#e0dbd6','#e0dbd6'];
    const DAY_NAME_COL =['#2e7d52','#2c5f9e','#2e7d52','#2c5f9e','#2e7d52','#7a7370','#7a7370'];
    const DAY_BORDER   =['#7ec4a0','#7aaad8','#8ed0b0','#8abcd4','#7ec4a0','#aaa69e','#aaa69e'];

    const di2=wk?(dow===6?6:5):dow===0?6:dow-1; // 0=Mon..6=Sun
    const rowBg=DAY_ROW_BG[di2];
    const cellBg=DAY_CELL_BG[di2];
    const nameCol=DAY_NAME_COL[di2];
    const borderCol=DAY_BORDER[di2];
    const rowBorder=`border-bottom:1px solid ${borderCol};`;

    html+=`<div style="display:flex;${rowBorder}background:${rowBg};min-height:${rowH}px">`;

    // Date cell — sticky left
    html+=`<div style="flex-shrink:0;width:${DATE_W}px;padding:5px 8px;border-right:2px solid ${borderCol};position:sticky;left:0;z-index:5;background:${cellBg}">`;
    html+=`<div style="font-size:12px;font-weight:700;color:#1a2a3a">${fmtDs(ds)}</div>`;
    html+=`<div style="font-size:10px;font-weight:500;color:${nameCol}">${dn}</div>`;
    html+=`</div>`;

    // Timeline area
    html+=`<div style="flex:1;position:relative;min-height:${rowH}px">`;

    // Hour grid lines (subtle)
    ticks.forEach(h=>{
      const pct=((h*60-T_START)/T_SPAN*100).toFixed(3);
      html+=`<div style="position:absolute;left:${pct}%;top:0;bottom:0;border-left:1px solid ${borderCol};opacity:0.8;pointer-events:none"></div>`;
    });

    // Shift bars — one per working employee, stacked vertically
    let barIndex=0;
    eds.forEach((ed,ei)=>{
      if(!ed.sched)return;
      const a=ed.sched.shift_start.split(':'),b=ed.sched.shift_end.split(':');
      const startMin=+a[0]*60+ +a[1];
      const endMin=+b[0]*60+ +b[1];
      const leftPct=((startMin-T_START)/T_SPAN*100).toFixed(3);
      const widthPct=((endMin-startMin)/T_SPAN*100).toFixed(3);
      const top=ROW_PAD+barIndex*(BAR_H+BAR_GAP);
      const color=empColors[ei];
      const name=ed.emp.name;
      const nh=netHrs(ed.sched);
      const firstName=name.split(' ')[0];
      html+=`<div style="position:absolute;left:${leftPct}%;width:${widthPct}%;top:${top}px;height:${BAR_H}px;background:${color};border-radius:4px;display:flex;align-items:center;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.18);border-left:3px solid rgba(0,0,0,.18)">
        <span style="font-size:10px;font-weight:700;color:#1a3a52;white-space:nowrap;padding:0 6px;letter-spacing:.01em">${firstName}</span>
      </div>`;
      barIndex++;
    });

    html+=`</div></div>`;
  });

  html+=`</div></div>`;
  try{ct.innerHTML=html;}catch(err){ct.innerHTML='<div class="alrt err" style="margin:16px">Calendar render error: '+err.message+'</div>';console.error(err);}
}

function renderCalPerson(period,emps,ct){
  document.getElementById('cal-person-picker-wrap').style.display='flex';
  const emp=emps.find(e=>e.id===calPersonId)||(emps.length?emps[0]:null);
  if(!emp){ct.innerHTML='<div class="empty">No employees.</div>';return;}
  calPersonId=emp.id;
  document.getElementById('cal-person-picker').value=emp.id;
  const rows=[];
  const d=parseLocalDate(period.start_date),end=parseLocalDate(period.end_date);
  while(d<=end){
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const dow=d.getDay(),di=dow===0?6:dow-1,dn=DAYS[di];
    // Skip holidays
    if(!globalVacSet.has(ds)){
      (emp.schedules||[]).forEach(s=>{
        if((s.days||[]).includes(dn)&&ds>=s.from_date&&ds<=s.to_date){
          const nh=netHrs(s);
          const brk=s.break_minutes!=null?s.break_minutes:30;
          rows.push({date:ds,day:dn,start:s.shift_start,end:s.shift_end,brk,hrs:nh});
        }
      });
    }
    d.setDate(d.getDate()+1);
  }
  const totalHrs=rows.reduce((a,r)=>a+r.hrs,0);
  const ini=emp.name.split(' ').map(x=>x[0]).join('');
  const bg=emp.type==='A'?'#B5D4F4':'#9FE1CB',col=emp.type==='A'?'#0C447C':'#085041';
  let html=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
    <div style="width:38px;height:38px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:${col}">${ini}</div>
    <div>
      <div style="font-weight:600;font-size:15px">${emp.name}</div>
      <div style="font-size:12px;color:#888"><span class="${emp.type==='A'?'ba':'bc'}">${emp.type==='A'?'APN':'Counseling'}</span> &nbsp;|&nbsp; ${period.name} &nbsp;|&nbsp; <strong>${rows.length}</strong> working days &nbsp;|&nbsp; <strong>${totalHrs.toFixed(1)}h</strong> net total</div>
    </div>
  </div>`;
  if(!rows.length){html+='<div class="empty">No working days scheduled for this employee in this period.</div>';}
  else{
    html+=`<div class="card" style="padding:0;overflow:hidden">
      <table class="person-table">
        <thead><tr><th style="padding:8px 12px">Date</th><th>Day</th><th>Shift start</th><th>Shift end</th><th>Break</th><th>Net hours</th></tr></thead>
        <tbody>${rows.map((r,i)=>`<tr style="${i%2===0?'':'background:#fafafa'}">
          <td style="padding:7px 12px;font-weight:500">${fmtFull(r.date)}</td>
          <td>${r.day}</td><td>${r.start}</td><td>${r.end}</td>
          <td>${r.brk} min</td>
          <td style="font-weight:500">${r.hrs.toFixed(1)}h</td>
        </tr>`).join('')}</tbody>
        <tfoot><tr style="background:#f7f7f5;font-weight:600">
          <td colspan="5" style="padding:8px 12px;text-align:right;color:#888">Total net hours:</td>
          <td style="padding:8px 12px">${totalHrs.toFixed(1)}h</td>
        </tr></tfoot>
      </table></div>`;
  }
  ct.innerHTML=html;
}

// ── CSV DOWNLOAD ──────────────────────────────────────────
function downloadCSV(){
  const {period,emps}=calCache;
  if(!period||!emps){toast('Load the calendar first',true);return;}
  let csv,filename;
  if(calTab==='grid'){
    const header=['Date','Day',...emps.map(e=>e.name+' shift'),...emps.map(e=>e.name+' net hrs')];
    const lines=[header.join(',')];
    const d=parseLocalDate(period.start_date),end=parseLocalDate(period.end_date);
    while(d<=end){
      const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      const dow=d.getDay(),di=dow===0?6:dow-1,dn=DAYS[di];
      const isHol=globalVacSet.has(ds);
      const shifts=emps.map(e=>{
        if(isHol)return 'Holiday';
        let found=null;
        (e.schedules||[]).forEach(s=>{if((s.days||[]).includes(dn)&&ds>=s.from_date&&ds<=s.to_date)found=s;});
        return found?`${found.shift_start}-${found.shift_end}`:'';
      });
      const hrs=emps.map(e=>{
        if(isHol)return '';
        let found=null;
        (e.schedules||[]).forEach(s=>{if((s.days||[]).includes(dn)&&ds>=s.from_date&&ds<=s.to_date)found=s;});
        return found?netHrs(found).toFixed(1):'';
      });
      lines.push([ds,dn,...shifts,...hrs].join(','));
      d.setDate(d.getDate()+1);
    }
    csv=lines.join('\n');
    filename=`schedule_${period.name.replace(/\s+/g,'_')}_full.csv`;
  }else{
    const emp=emps.find(e=>e.id===calPersonId);
    if(!emp){toast('Select an employee first',true);return;}
    const lines=[['Date','Day','Shift start','Shift end','Break (min)','Net hours'].join(',')];
    const d=parseLocalDate(period.start_date),end=parseLocalDate(period.end_date);
    while(d<=end){
      const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      const dow=d.getDay(),di=dow===0?6:dow-1,dn=DAYS[di];
      if(!globalVacSet.has(ds)){
        (emp.schedules||[]).forEach(s=>{
          if((s.days||[]).includes(dn)&&ds>=s.from_date&&ds<=s.to_date){
            const brk=s.break_minutes!=null?s.break_minutes:30;
            lines.push([ds,dn,s.shift_start,s.shift_end,brk,netHrs(s).toFixed(1)].join(','));
          }
        });
      }
      d.setDate(d.getDate()+1);
    }
    csv=lines.join('\n');
    filename=`schedule_${emp.name.replace(/\s+/g,'_')}_${period.name.replace(/\s+/g,'_')}.csv`;
  }
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);toast('CSV downloaded');
}

// ── USERS ─────────────────────────────────────────────────
// ── SETTINGS ──────────────────────────────────────────────
let settingsTab='access';
function renderSettings(tab){
  settingsTab=tab||settingsTab;
  document.getElementById('stab-access').classList.toggle('active',settingsTab==='access');
  document.getElementById('stab-vacations').classList.toggle('active',settingsTab==='vacations');
  if(settingsTab==='access') renderAccess();
  else renderVacations();
}

async function renderAccess(){
  const ct=document.getElementById('settings-content');
  ct.innerHTML='<div class="empty"><span class="spinner"></span> Loading...</div>';
  const {data}=await db.from('users').select('*').order('name');
  const rows=(data||[]).map(u=>`<tr>
    <td>${u.name}</td><td><code style="font-size:12px">${u.username}</code></td>
    <td><code style="font-size:12px;color:#aaa">&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;</code></td>
    <td><span style="padding:2px 8px;border-radius:20px;font-size:11px;background:${u.role==='admin'?'#FAC775':'#e0e0e0'};color:${u.role==='admin'?'#633806':'#555'}">${u.role==='admin'?'Manager':'Viewer'}</span></td>
    <td><div style="display:flex;gap:5px">
      <button class="btn btns" onclick="editUserMod('${u.id}','${u.name}','${u.username}','${u.role}')">Edit</button>
      <button class="btn btns btnd" onclick="deleteUser('${u.id}')">Remove</button>
    </div></td></tr>`).join('');
  ct.innerHTML=`
    <div class="card">
      <div style="font-size:13px;font-weight:500;margin-bottom:9px;color:#888">Add user</div>
      <div class="row">
        <div style="flex:2"><label>Name</label><input id="u-name" placeholder="Full name"></div>
        <div style="flex:2"><label>Username</label><input id="u-login" placeholder="login"></div>
        <div style="flex:2"><label>Password</label><input type="password" id="u-pass" placeholder="password"></div>
        <div style="flex:1"><label>Role</label><select id="u-role"><option value="viewer">Viewer</option><option value="admin">Manager</option></select></div>
        <button class="btn btnp" onclick="addUser()">Add</button>
      </div>
    </div>
    <div class="card"><table>
      <thead><tr><th>Name</th><th>Username</th><th>Password</th><th>Role</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
}
async function renderUsers(){renderAccess();}

async function renderVacations(){
  const ct=document.getElementById('settings-content');
  ct.innerHTML='<div class="empty"><span class="spinner"></span> Loading...</div>';
  const {data:vacs,error}=await db.from('vacations').select('*').order('date').then(r=>r).catch(()=>({data:[],error:null}));
  ct.innerHTML=`
    <div class="card">
      <div style="font-size:13px;font-weight:500;margin-bottom:9px;color:#888">Add holiday</div>
      <div class="row">
        <div style="flex:1"><label>Date</label><input type="date" id="v-date"></div>
        <div style="flex:3"><label>Label (e.g. Independence Day)</label><input id="v-label" placeholder="Holiday name"></div>
        <button class="btn btnp" onclick="addVacation()">Add</button>
      </div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:500;margin-bottom:10px;color:#888">
        Holiday days
        <span style="font-weight:400;margin-left:8px;font-size:12px">(applied across all periods)</span>
      </div>
      ${!vacs||!vacs.length
        ?'<div class="empty">No holidays defined yet.</div>'
        :`<table>
          <thead><tr><th>Date</th><th>Day</th><th>Label</th><th></th></tr></thead>
          <tbody>${vacs.map(v=>{
            const dt=parseLocalDate(v.date);
            const dn=DAYF[dt.getDay()===0?6:dt.getDay()-1];
            return `<tr>
              <td style="font-weight:500">${fmtD(v.date)}</td>
              <td style="color:#888">${dn}</td>
              <td>${v.label||''}</td>
              <td><button class="btn btns btnd" onclick="deleteVacation('${v.id}')">Remove</button></td>
            </tr>`;
          }).join('')}
          </tbody></table>`}
    </div>`;
}

async function addVacation(){
  const date=document.getElementById('v-date').value;
  const label=document.getElementById('v-label').value.trim();
  if(!date){alert('Please select a date');return;}
  const {error}=await db.from('vacations').insert({id:uid(),date,label});
  if(error){toast(error.message.includes('unique')?'This date is already defined':'Error adding holiday',true);return;}
  document.getElementById('v-date').value='';
  document.getElementById('v-label').value='';
  toast('Holiday added');
  await loadGlobalVacations();
  renderVacations();
  refreshAfterVacationChange();
}
async function deleteVacation(id){
  await db.from('vacations').delete().eq('id',id);
  toast('Holiday removed');
  await loadGlobalVacations();
  renderVacations();
  refreshAfterVacationChange();
}
function refreshAfterVacationChange(){
  // Re-render employees page if currently visible (updates shift counts + total hours)
  if(document.getElementById('pg-employees').classList.contains('active'))renderEmp();
  // Re-render calendar if currently visible (updates closed day display)
  if(document.getElementById('pg-calendar').classList.contains('active'))renderCal();
}
async function addUser(){
  const name=document.getElementById('u-name').value.trim();
  const username=document.getElementById('u-login').value.trim();
  const password=document.getElementById('u-pass').value;
  const role=document.getElementById('u-role').value;
  if(!name||!username||!password){alert('All fields required');return;}
  const {error}=await db.from('users').insert({id:uid(),name,username,password,role});
  if(error){toast(error.message.includes('unique')?'Username already exists':'Error adding user',true);return;}
  document.getElementById('u-name').value='';
  document.getElementById('u-login').value='';
  document.getElementById('u-pass').value='';
  toast('User added');renderAccess();
}
function editUserMod(id,name,username,role){
  showMod(`<h3>Edit user</h3>
    <div class="fg"><label>Name</label><input id="m-n" value="${name}"></div>
    <div class="fg"><label>Username</label><input id="m-u" value="${username}"></div>
    <div class="fg"><label>New password</label><input type="password" id="m-p" placeholder="Leave blank to keep current"></div>
    <div class="fg"><label>Role</label><select id="m-r">
      <option value="viewer" ${role==='viewer'?'selected':''}>Viewer</option>
      <option value="admin" ${role==='admin'?'selected':''}>Manager</option>
    </select></div>
    <div class="ma"><button class="btn" onclick="closeMod()">Cancel</button>
    <button class="btn btnp" onclick="saveUser('${id}')">Save</button></div>`);
}
async function saveUser(id){
  const name=document.getElementById('m-n').value.trim();
  const username=document.getElementById('m-u').value.trim();
  const pw=document.getElementById('m-p').value;
  const role=document.getElementById('m-r').value;
  const upd={name,username,role};if(pw)upd.password=pw;
  await db.from('users').update(upd).eq('id',id);
  closeMod();toast('User updated');renderAccess();
}
async function deleteUser(id){
  if(currentUser&&currentUser.id===id){alert('Cannot delete yourself');return;}
  if(!confirm('Remove this user?'))return;
  await db.from('users').delete().eq('id',id);
  toast('User removed');renderAccess();
}
</script>
