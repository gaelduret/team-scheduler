<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Scheduler</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:sans-serif;font-size:14px;color:#111;background:#f0f0f0}
.app{display:flex;flex-direction:column;height:100vh;background:#fff}
.topbar{flex-shrink:0;display:flex;align-items:center;gap:4px;padding:10px 16px;border-bottom:1px solid #e0e0e0;background:#f7f7f5;position:sticky;top:0;z-index:50}
.logo{font-size:14px;font-weight:600;margin-right:12px;white-space:nowrap}
.nb{padding:6px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#666}
.nb:hover{background:#fff}
.nb.active{background:#fff;color:#111;font-weight:500}
.uinfo{margin-left:auto;font-size:11px;color:#aaa;display:flex;align-items:center;gap:8px}
.main{flex:1;overflow:auto;padding:20px;background:#fff}
.pg{display:none}.pg.active{display:block}
.ptitle{font-size:17px;font-weight:600;margin-bottom:14px}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:14px;margin-bottom:14px}
.row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
label{font-size:12px;color:#888;display:block;margin-bottom:3px}
input,select{font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#111;width:100%}
.btn{padding:6px 13px;border-radius:7px;border:1px solid #ddd;background:transparent;cursor:pointer;font-size:13px;color:#111;white-space:nowrap}
.btn:hover{background:#f5f5f5}
.btnp{background:#185FA5;color:#fff;border-color:#185FA5}
.btnp:hover{background:#0C447C}
.btnd{color:#a32d2d;border-color:#f7c1c1}
.btnd:hover{background:#fcebeb}
.btns{padding:3px 9px;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 9px;border-bottom:1px solid #e5e5e5;font-weight:500;font-size:12px;color:#888}
td{padding:7px 9px;border-bottom:1px solid #f0f0f0}
.ba{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;background:#B5D4F4;color:#0C447C}
.bc{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;background:#9FE1CB;color:#085041}
.pc{border:1px solid #e5e5e5;border-radius:8px;padding:11px;cursor:pointer;margin-bottom:8px}
.pc:hover{border-color:#bbb}
.pc.sel{border-color:#185FA5;background:#E6F1FB}
.empty{text-align:center;padding:36px;color:#bbb;font-size:13px}
.calt{border-collapse:collapse;font-size:11px}
.calt th,.calt td{border:1px solid #e5e5e5;padding:2px 4px;min-width:46px;white-space:nowrap}
.calt th{background:#f7f7f5;font-weight:500;text-align:center;position:sticky;top:0;z-index:2}
.datecol{min-width:72px;width:72px;background:#f7f7f5;position:sticky;left:0;z-index:3}
.datecol.th-corner{z-index:4}
.chip{border-radius:3px;padding:1px 4px;font-size:10px;white-space:nowrap;display:inline-block;margin:1px 0}
.ca{background:#B5D4F4;color:#0C447C}
.cc{background:#9FE1CB;color:#085041}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:#f7f7f5;border-radius:8px;padding:9px 13px;min-width:110px}
.sv{font-size:19px;font-weight:600}.sl{font-size:11px;color:#888;margin-top:1px}
.tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid #e5e5e5;padding-bottom:6px}
.tab{padding:5px 13px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#888}
.tab.active{background:#f0f0f0;color:#111;font-weight:500}
.alrt{padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:12px;background:#E6F1FB;color:#0C447C}
.err{background:#FCEBEB;color:#a32d2d}
.fg{margin-bottom:11px}
.dc{display:flex;flex-wrap:wrap;gap:7px}
.dc label{display:flex;align-items:center;gap:4px;font-size:12px;color:#111;cursor:pointer;font-weight:normal}
.dc input[type=checkbox]{width:auto}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:440px;max-width:95vw;border:1px solid #e5e5e5;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:13px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.login-wrap{position:fixed;inset:0;background:#f0f0f0;display:flex;align-items:center;justify-content:center;z-index:300}
.login-box{width:340px;padding:32px;border:1px solid #e5e5e5;border-radius:12px;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.login-box h2{font-size:20px;font-weight:600;margin-bottom:4px}
.login-box p{font-size:12px;color:#888;margin-bottom:20px}
.login-err{color:#a32d2d;font-size:12px;margin-top:8px;min-height:16px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#185FA5;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <h2>Team Scheduler</h2>
    <p>Sign in to continue</p>
    <div class="fg"><label>Username</label><input id="li-user" placeholder="Enter username" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="fg"><label>Password</label><input type="password" id="li-pass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btnp" style="width:100%;margin-top:4px" onclick="doLogin()" id="li-btn">Sign in</button>
    <div class="login-err" id="li-err"></div>
  </div>
</div>

<!-- App -->
<div class="app" id="app" style="display:none">
  <div class="topbar">
    <div class="logo">Team Scheduler</div>
    <span id="nav-admin" style="display:none;gap:4px">
      <button class="nb active" onclick="nav('periods')">Periods</button>
      <button class="nb" onclick="nav('employees')">Employees</button>
      <button class="nb" onclick="nav('calendar')">Calendar</button>
      <button class="nb" onclick="nav('users')">Access</button>
    </span>
    <span id="nav-viewer" style="display:none">
      <button class="nb active">Calendar</button>
    </span>
    <div class="uinfo">
      <span id="uname-label"></span>
      <button class="btn btns" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <!-- PERIODS -->
    <div class="pg active" id="pg-periods">
      <div class="ptitle">Schedule Periods</div>
      <div class="card">
        <div style="font-size:13px;font-weight:500;margin-bottom:9px;color:#888">Create new period</div>
        <div class="row">
          <div style="flex:2"><label>Period name</label><input id="p-name" placeholder="e.g. H1 2025"></div>
          <div style="flex:1"><label>Start date</label><input type="date" id="p-start"></div>
          <div style="flex:1"><label>End date</label><input type="date" id="p-end"></div>
          <button class="btn btnp" onclick="addPeriod()">Add period</button>
        </div>
      </div>
      <div id="periods-list"></div>
    </div>

    <!-- EMPLOYEES -->
    <div class="pg" id="pg-employees">
      <div class="ptitle">Employees</div>
      <div id="emp-alert" style="display:none" class="alrt"></div>
      <div id="emp-content"></div>
    </div>

    <!-- CALENDAR -->
    <div class="pg" id="pg-calendar">
      <div class="ptitle">Schedule Calendar</div>
      <div id="cal-alert" style="display:none" class="alrt"></div>
      <div id="cal-content"></div>
    </div>

    <!-- USERS -->
    <div class="pg" id="pg-users">
      <div class="ptitle">Access Management</div>
      <div class="card">
        <div style="font-size:13px;font-weight:500;margin-bottom:9px;color:#888">Add user</div>
        <div class="row">
          <div style="flex:2"><label>Name</label><input id="u-name" placeholder="Full name"></div>
          <div style="flex:2"><label>Username</label><input id="u-login" placeholder="login"></div>
          <div style="flex:2"><label>Password</label><input type="password" id="u-pass" placeholder="password"></div>
          <div style="flex:1"><label>Role</label><select id="u-role"><option value="viewer">Viewer</option><option value="admin">Manager</option></select></div>
          <button class="btn btnp" onclick="addUser()">Add</button>
        </div>
      </div>
      <div id="users-table"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeMod()">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Supabase ──────────────────────────────────────────────
const SUPA_URL = 'https://cqmvotqsptqrzogvrulk.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxbXZvdHFzcHRxcnpvZ3ZydWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjgwODksImV4cCI6MjA5MjEwNDA4OX0.Yyxalgqg5BHsULgPDPXewJaQ23L7muldKVlSGxmMaTs';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── Helpers ───────────────────────────────────────────────
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAYF = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
function pad(n){return n<10?'0'+n:''+n}
function uid(){return 'x'+Math.random().toString(36).slice(2,10)}
function fmtD(d){if(!d)return'';const p=d.split('-');return p[1]+'/'+p[2]+'/'+p[0];}
function fmtDs(d){const dt=new Date(d+'T00:00:00');return(dt.getMonth()+1)+'/'+(dt.getDate());}
function toast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=err?'#a32d2d':'#1a1a1a';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}
function showMod(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('overlay').classList.add('open');}
function closeMod(){document.getElementById('overlay').classList.remove('open');document.getElementById('modal-box').innerHTML='';}
function loading(id,on){const el=document.getElementById(id);if(el)el.disabled=on;}

// ── State ─────────────────────────────────────────────────
let currentUser = null;
let currentPeriod = null;
let empTab = 'list';

// ── Auth ──────────────────────────────────────────────────
async function doLogin(){
  const u=document.getElementById('li-user').value.trim();
  const p=document.getElementById('li-pass').value;
  document.getElementById('li-err').textContent='';
  document.getElementById('li-btn').innerHTML='<span class="spinner"></span>Signing in...';
  document.getElementById('li-btn').disabled=true;
  const {data,error}=await db.from('users').select('*').eq('username',u).eq('password',p).single();
  document.getElementById('li-btn').innerHTML='Sign in';
  document.getElementById('li-btn').disabled=false;
  if(error||!data){document.getElementById('li-err').textContent='Invalid username or password.';return;}
  currentUser=data;
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('uname-label').textContent=data.name+' ('+data.role+')';
  if(data.role==='admin'){document.getElementById('nav-admin').style.display='flex';nav('periods');}
  else{document.getElementById('nav-viewer').style.display='flex';showCal();}
}
function doLogout(){
  currentUser=null;currentPeriod=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('li-user').value='';
  document.getElementById('li-pass').value='';
  document.getElementById('nav-admin').style.display='none';
  document.getElementById('nav-viewer').style.display='none';
}

// ── Navigation ────────────────────────────────────────────
function nav(p){
  document.querySelectorAll('#nav-admin .nb').forEach((b,i)=>{
    b.classList.toggle('active',['periods','employees','calendar','users'][i]===p);
  });
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('active'));
  document.getElementById('pg-'+p).classList.add('active');
  if(p==='periods')renderPeriods();
  if(p==='employees')renderEmp();
  if(p==='calendar')renderCal();
  if(p==='users')renderUsers();
}
function showCal(){
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('active'));
  document.getElementById('pg-calendar').classList.add('active');
  renderCal();
}

// ── PERIODS ───────────────────────────────────────────────
async function renderPeriods(){
  const c=document.getElementById('periods-list');
  c.innerHTML='<div class="empty"><span class="spinner"></span> Loading...</div>';
  const {data,error}=await db.from('periods').select('*').order('start_date');
  if(error){c.innerHTML='<div class="alrt err">Error loading periods.</div>';return;}
  if(!data.length){c.innerHTML='<div class="empty">No periods yet. Create one above.</div>';return;}
  c.innerHTML=data.map(p=>`
    <div class="pc ${currentPeriod===p.id?'sel':''}" onclick="selectPeriod('${p.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-weight:500">${p.name}</div>
          <div style="font-size:12px;color:#888;margin-top:2px">${fmtD(p.start_date)} → ${fmtD(p.end_date)}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${currentPeriod===p.id?'<span style="font-size:11px;color:#185FA5;font-weight:500">Selected</span>':''}
          <button class="btn btns" onclick="event.stopPropagation();editPeriodMod('${p.id}','${p.name}','${p.start_date}','${p.end_date}')">Edit</button>
          <button class="btn btns btnd" onclick="event.stopPropagation();deletePeriod('${p.id}')">Delete</button>
        </div>
      </div>
    </div>`).join('');
}
function selectPeriod(id){currentPeriod=id;renderPeriods();}
async function addPeriod(){
  const name=document.getElementById('p-name').value.trim();
  const start=document.getElementById('p-start').value;
  const end=document.getElementById('p-end').value;
  if(!name||!start||!end){alert('Fill all fields');return;}
  const {error}=await db.from('periods').insert({id:uid(),name,start_date:start,end_date:end});
  if(error){toast('Error adding period',true);return;}
  document.getElementById('p-name').value='';
  document.getElementById('p-start').value='';
  document.getElementById('p-end').value='';
  toast('Period added');renderPeriods();
}
async function deletePeriod(id){
  if(!confirm('Delete this period and all its employees?'))return;
  await db.from('periods').delete().eq('id',id);
  if(currentPeriod===id)currentPeriod=null;
  toast('Period deleted');renderPeriods();
}
function editPeriodMod(id,name,start,end){
  showMod(`<h3>Edit period</h3>
    <div class="fg"><label>Name</label><input id="m-n" value="${name}"></div>
    <div class="row">
      <div style="flex:1"><label>Start</label><input type="date" id="m-s" value="${start}"></div>
      <div style="flex:1"><label>End</label><input type="date" id="m-e" value="${end}"></div>
    </div>
    <div class="ma">
      <button class="btn" onclick="closeMod()">Cancel</button>
      <button class="btn btnp" onclick="savePeriod('${id}')">Save</button>
    </div>`);
}
async function savePeriod(id){
  const name=document.getElementById('m-n').value.trim();
  const start=document.getElementById('m-s').value;
  const end=document.getElementById('m-e').value;
  await db.from('periods').update({name,start_date:start,end_date:end}).eq('id',id);
  closeMod();toast('Period updated');renderPeriods();
}

// ── EMPLOYEES ─────────────────────────────────────────────
async function renderEmp(){
  const al=document.getElementById('emp-alert'),ct=document.getElementById('emp-content');
  if(!currentPeriod){al.style.display='block';al.textContent='Select a period first from the Periods page.';ct.innerHTML='';return;}
  al.style.display='none';
  const {data:period}=await db.from('periods').select('*').eq('id',currentPeriod).single();
  const {data:emps}=await db.from('employees').select('*, schedules(*)').eq('period_id',currentPeriod).order('name');
  ct.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:13px;color:#888">Period: <strong>${period.name}</strong></div>
      <button class="btn btnp" onclick="addEmpMod()">+ Add employee</button>
    </div>
    <div class="tabs">
      <button class="tab ${empTab==='list'?'active':''}" onclick="setEmpTab('list')">Employee list</button>
      <button class="tab ${empTab==='summary'?'active':''}" onclick="setEmpTab('summary')">Hours summary</button>
    </div>
    ${empTab==='list'?renderEmpList(emps,period):renderEmpSummary(emps,period)}`;
}
function setEmpTab(t){empTab=t;renderEmp();}

function renderEmpList(emps,period){
  if(!emps||!emps.length)return'<div class="empty">No employees yet. Add one above.</div>';
  return emps.map(e=>{
    const ini=e.name.split(' ').map(x=>x[0]).join('');
    const bg=e.type==='A'?'#B5D4F4':'#9FE1CB';
    const col=e.type==='A'?'#0C447C':'#085041';
    const schs=e.schedules||[];
    return `<div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
        <div style="display:flex;align-items:center;gap:9px">
          <div style="width:32px;height:32px;border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-weight:500;font-size:12px;color:${col}">${ini}</div>
          <div><div style="font-weight:500">${e.name}</div><span class="${e.type==='A'?'ba':'bc'}">${e.type==='A'?'APN':'Counseling'}</span></div>
        </div>
        <div style="display:flex;gap:5px">
          <button class="btn btns" onclick="addScheduleMod('${e.id}','${period.start_date}','${period.end_date}')">+ Shift</button>
          <button class="btn btns" onclick="editEmpMod('${e.id}','${e.name}','${e.type}')">Edit</button>
          <button class="btn btns btnd" onclick="deleteEmp('${e.id}')">Delete</button>
        </div>
      </div>
      ${schs.length?`
        <div style="font-size:12px;color:#888;margin-bottom:5px">Schedules:</div>
        <table><thead><tr><th>Days</th><th>Shift</th><th>From</th><th>To</th><th>Hrs/wk</th><th></th></tr></thead><tbody>
        ${schs.map(s=>`<tr>
          <td>${s.days.join(', ')}</td>
          <td>${s.shift_start} – ${s.shift_end}</td>
          <td>${fmtD(s.from_date)}</td><td>${fmtD(s.to_date)}</td>
          <td>${calcWeekHours(s).toFixed(1)}h</td>
          <td><button class="btn btns btnd" onclick="deleteSched('${s.id}')">Remove</button></td>
        </tr>`).join('')}
        </tbody></table>`
      :'<div style="font-size:12px;color:#ccc">No schedules defined.</div>'}
    </div>`;
  }).join('');
}

function renderEmpSummary(emps,period){
  if(!emps||!emps.length)return'<div class="empty">No employees yet.</div>';
  let totalAll=0;
  const rows=emps.map(e=>{
    const t=calcTotalHours(e,period);totalAll+=t;
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:7px">
        <div style="width:26px;height:26px;border-radius:50%;background:${e.type==='A'?'#B5D4F4':'#9FE1CB'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:${e.type==='A'?'#0C447C':'#085041'}">${e.name.split(' ').map(x=>x[0]).join('')}</div>
        ${e.name}</div></td>
      <td><span class="${e.type==='A'?'ba':'bc'}">${e.type==='A'?'APN':'Counseling'}</span></td>
      <td>${(e.schedules||[]).length}</td>
      <td style="font-weight:500">${t.toFixed(1)}h</td>
      <td>${(t/6).toFixed(1)}h</td></tr>`;
  }).join('');
  return `<div class="stats">
    <div class="stat"><div class="sv">${emps.length}</div><div class="sl">Employees</div></div>
    <div class="stat"><div class="sv">${emps.filter(e=>e.type==='A').length}</div><div class="sl">APN staff</div></div>
    <div class="stat"><div class="sv">${emps.filter(e=>e.type==='C').length}</div><div class="sl">Counseling</div></div>
    <div class="stat"><div class="sv">${totalAll.toFixed(0)}h</div><div class="sl">Total hours</div></div>
  </div>
  <div class="card"><table>
    <thead><tr><th>Employee</th><th>Type</th><th>Schedules</th><th>Total hrs</th><th>Avg/month</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function calcWeekHours(s){
  const a=s.shift_start.split(':'),b=s.shift_end.split(':');
  return(+b[0]*60+ +b[1]- +a[0]*60- +a[1])/60*(s.days||[]).length;
}
function calcTotalHours(emp,period){
  let tot=0;
  (emp.schedules||[]).forEach(s=>{
    const f=new Date(Math.max(+new Date(s.from_date),+new Date(period.start_date)));
    const t=new Date(Math.min(+new Date(s.to_date),+new Date(period.end_date)));
    if(f>t)return;
    const a=s.shift_start.split(':'),b=s.shift_end.split(':');
    const d=(+b[0]*60+ +b[1]- +a[0]*60- +a[1])/60;
    const x=new Date(f);
    while(x<=t){const dn=DAYS[x.getDay()===0?6:x.getDay()-1];if((s.days||[]).includes(dn))tot+=d;x.setDate(x.getDate()+1);}
  });
  return tot;
}

function addEmpMod(){
  showMod(`<h3>Add employee</h3>
    <div class="fg"><label>Full name</label><input id="m-n" placeholder="First Last"></div>
    <div class="fg"><label>Type</label><select id="m-t"><option value="A">A – APN</option><option value="C">C – Counseling</option></select></div>
    <div class="ma"><button class="btn" onclick="closeMod()">Cancel</button>
    <button class="btn btnp" onclick="addEmp()">Add</button></div>`);
}
async function addEmp(){
  const name=document.getElementById('m-n').value.trim();
  const type=document.getElementById('m-t').value;
  if(!name){alert('Name required');return;}
  await db.from('employees').insert({id:uid(),period_id:currentPeriod,name,type});
  closeMod();toast('Employee added');renderEmp();
}
function editEmpMod(id,name,type){
  showMod(`<h3>Edit employee</h3>
    <div class="fg"><label>Full name</label><input id="m-n" value="${name}"></div>
    <div class="fg"><label>Type</label><select id="m-t">
      <option value="A" ${type==='A'?'selected':''}>A – APN</option>
      <option value="C" ${type==='C'?'selected':''}>C – Counseling</option>
    </select></div>
    <div class="ma"><button class="btn" onclick="closeMod()">Cancel</button>
    <button class="btn btnp" onclick="saveEmp('${id}')">Save</button></div>`);
}
async function saveEmp(id){
  const name=document.getElementById('m-n').value.trim();
  const type=document.getElementById('m-t').value;
  await db.from('employees').update({name,type}).eq('id',id);
  closeMod();toast('Employee updated');renderEmp();
}
async function deleteEmp(id){
  if(!confirm('Delete this employee and all their schedules?'))return;
  await db.from('employees').delete().eq('id',id);
  toast('Employee deleted');renderEmp();
}

function addScheduleMod(eid,pstart,pend){
  const dh=DAYF.map((d,i)=>`<label><input type="checkbox" value="${DAYS[i]}" id="ck-${DAYS[i]}"> ${d}</label>`).join('');
  showMod(`<h3>Add shift schedule</h3>
    <div class="fg"><label>Working days</label><div class="dc">${dh}</div></div>
    <div class="row">
      <div style="flex:1"><label>Shift start</label><input type="time" id="m-ss" value="08:30"></div>
      <div style="flex:1"><label>Shift end</label><input type="time" id="m-se" value="17:00"></div>
    </div>
    <div class="row" style="margin-top:10px">
      <div style="flex:1"><label>From</label><input type="date" id="m-sf" value="${pstart}"></div>
      <div style="flex:1"><label>To</label><input type="date" id="m-st" value="${pend}"></div>
    </div>
    <div class="ma"><button class="btn" onclick="closeMod()">Cancel</button>
    <button class="btn btnp" onclick="addSched('${eid}')">Add shift</button></div>`);
}
async function addSched(eid){
  const days=DAYS.filter(d=>{const el=document.getElementById('ck-'+d);return el&&el.checked;});
  const ss=document.getElementById('m-ss').value,se=document.getElementById('m-se').value;
  const sf=document.getElementById('m-sf').value,st=document.getElementById('m-st').value;
  if(!days.length){alert('Select at least one day');return;}
  if(!ss||!se||!sf||!st){alert('Fill all fields');return;}
  await db.from('schedules').insert({id:uid(),employee_id:eid,days,shift_start:ss,shift_end:se,from_date:sf,to_date:st});
  closeMod();toast('Shift added');renderEmp();
}
async function deleteSched(id){
  await db.from('schedules').delete().eq('id',id);
  toast('Shift removed');renderEmp();
}

// ── CALENDAR ──────────────────────────────────────────────
async function renderCal(){
  const al=document.getElementById('cal-alert'),ct=document.getElementById('cal-content');
  if(!currentPeriod){al.style.display='block';al.textContent='Select a period first from the Periods page.';ct.innerHTML='';return;}
  al.style.display='none';
  ct.innerHTML='<div class="empty"><span class="spinner"></span> Loading calendar...</div>';
  const {data:period}=await db.from('periods').select('*').eq('id',currentPeriod).single();
  const {data:emps}=await db.from('employees').select('*, schedules(*)').eq('period_id',currentPeriod).order('name');
  if(!emps||!emps.length){ct.innerHTML='<div class="empty">No employees in this period.</div>';return;}

  const slots=[];
  for(let h=8;h<=19;h++){slots.push(pad(h)+':00');if(h<19)slots.push(pad(h)+':30');}

  let html=`<div style="font-size:13px;margin-bottom:6px;color:#888">Period: <strong>${period.name}</strong> | ${fmtD(period.start_date)} – ${fmtD(period.end_date)}</div>`;
  html+=`<div style="display:flex;gap:14px;margin-bottom:10px;font-size:12px">
    <span><span style="display:inline-block;width:10px;height:10px;background:#B5D4F4;border-radius:2px;margin-right:3px"></span>APN</span>
    <span><span style="display:inline-block;width:10px;height:10px;background:#9FE1CB;border-radius:2px;margin-right:3px"></span>Counseling</span>
  </div>`;

  html+=`<table class="calt"><thead><tr>
    <th class="datecol th-corner">Date</th>`;
  slots.forEach(t=>html+=`<th>${t}</th>`);
  emps.forEach(e=>html+=`<th style="min-width:44px;font-size:10px">${e.name.split(' ').map(x=>x[0]).join('')}<br>hrs</th>`);
  html+=`</tr></thead><tbody>`;

  const d=new Date(period.start_date+'T00:00:00');
  const end=new Date(period.end_date+'T00:00:00');
  while(d<=end){
    const ds=d.toISOString().slice(0,10);
    const dow=d.getDay(),di=dow===0?6:dow-1,dn=DAYS[di],wk=dow===0||dow===6;
    const eds=emps.map(e=>{
      let act=null;
      (e.schedules||[]).forEach(s=>{if((s.days||[]).includes(dn)&&ds>=s.from_date&&ds<=s.to_date)act=s;});
      return{emp:e,sched:act};
    });
    html+=`<tr ${wk?'style="background:#f7f7f5"':''}>`;
    html+=`<td class="datecol" style="font-size:11px"><strong>${fmtDs(ds)}</strong><br><span style="color:#888">${dn}</span></td>`;
    slots.forEach(slot=>{
      const sp=slot.split(':'),sm=+sp[0]*60+ +sp[1];
      const here=eds.filter(ed=>{
        if(!ed.sched)return false;
        const a=ed.sched.shift_start.split(':'),b=ed.sched.shift_end.split(':');
        return sm>= +a[0]*60+ +a[1]&&sm< +b[0]*60+ +b[1];
      });
      html+=`<td>${here.map(ed=>`<span class="chip ${ed.emp.type==='A'?'ca':'cc'}">${ed.emp.name.split(' ')[0]}</span>`).join('<br>')}</td>`;
    });
    eds.forEach(ed=>{
      if(ed.sched){
        const a=ed.sched.shift_start.split(':'),b=ed.sched.shift_end.split(':');
        const hrs=(+b[0]*60+ +b[1]- +a[0]*60- +a[1])/60;
        html+=`<td style="text-align:center;font-size:11px;font-weight:500;color:${ed.emp.type==='A'?'#0C447C':'#085041'}">${hrs.toFixed(1)}h</td>`;
      } else html+=`<td></td>`;
    });
    html+=`</tr>`;
    d.setDate(d.getDate()+1);
  }
  html+=`</tbody></table>`;
  ct.innerHTML=html;
}

// ── USERS ─────────────────────────────────────────────────
async function renderUsers(){
  const {data}=await db.from('users').select('*').order('name');
  const rows=(data||[]).map(u=>`<tr>
    <td>${u.name}</td>
    <td><code style="font-size:12px">${u.username}</code></td>
    <td><code style="font-size:12px;color:#aaa">••••••••</code></td>
    <td><span style="padding:2px 8px;border-radius:20px;font-size:11px;background:${u.role==='admin'?'#FAC775':'#e0e0e0'};color:${u.role==='admin'?'#633806':'#555'}">${u.role==='admin'?'Manager':'Viewer'}</span></td>
    <td><div style="display:flex;gap:5px">
      <button class="btn btns" onclick="editUserMod('${u.id}','${u.name}','${u.username}','${u.role}')">Edit</button>
      <button class="btn btns btnd" onclick="deleteUser('${u.id}')">Remove</button>
    </div></td></tr>`).join('');
  document.getElementById('users-table').innerHTML=`<div class="card"><table>
    <thead><tr><th>Name</th><th>Username</th><th>Password</th><th>Role</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}
async function addUser(){
  const name=document.getElementById('u-name').value.trim();
  const username=document.getElementById('u-login').value.trim();
  const password=document.getElementById('u-pass').value;
  const role=document.getElementById('u-role').value;
  if(!name||!username||!password){alert('All fields required');return;}
  const {error}=await db.from('users').insert({id:uid(),name,username,password,role});
  if(error){toast(error.message.includes('unique')?'Username already exists':'Error adding user',true);return;}
  document.getElementById('u-name').value='';
  document.getElementById('u-login').value='';
  document.getElementById('u-pass').value='';
  toast('User added');renderUsers();
}
function editUserMod(id,name,username,role){
  showMod(`<h3>Edit user</h3>
    <div class="fg"><label>Name</label><input id="m-n" value="${name}"></div>
    <div class="fg"><label>Username</label><input id="m-u" value="${username}"></div>
    <div class="fg"><label>New password</label><input type="password" id="m-p" placeholder="Leave blank to keep current"></div>
    <div class="fg"><label>Role</label><select id="m-r">
      <option value="viewer" ${role==='viewer'?'selected':''}>Viewer</option>
      <option value="admin" ${role==='admin'?'selected':''}>Manager</option>
    </select></div>
    <div class="ma"><button class="btn" onclick="closeMod()">Cancel</button>
    <button class="btn btnp" onclick="saveUser('${id}')">Save</button></div>`);
}
async function saveUser(id){
  const name=document.getElementById('m-n').value.trim();
  const username=document.getElementById('m-u').value.trim();
  const pw=document.getElementById('m-p').value;
  const role=document.getElementById('m-r').value;
  const upd={name,username,role};
  if(pw)upd.password=pw;
  await db.from('users').update(upd).eq('id',id);
  closeMod();toast('User updated');renderUsers();
}
async function deleteUser(id){
  if(currentUser&&currentUser.id===id){alert('Cannot delete yourself');return;}
  if(!confirm('Remove this user?'))return;
  await db.from('users').delete().eq('id',id);
  toast('User removed');renderUsers();
}
</script>
